name: Annual Sri Lanka Holiday Dataset Update

on:
  # Allows manual execution from the GitHub Actions page
  workflow_dispatch:

  # Runs every January 5 at 03:30 UTC
  # 03:30 UTC = 09:00 AM Sri Lanka time
  schedule:
    - cron: "30 3 5 1 *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: annual-sri-lanka-holiday-update
  cancel-in-progress: false

jobs:
  update-dataset:
    name: Update holiday datasets
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ---------------------------------------------------------
      # 1. Checkout the main branch
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # ---------------------------------------------------------
      # 2. Set up Python
      # ---------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      # ---------------------------------------------------------
      # 3. Install Linux packages required for PDF processing/OCR
      # ---------------------------------------------------------
      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            tesseract-ocr \
            poppler-utils

      # ---------------------------------------------------------
      # 4. Install Python packages
      # ---------------------------------------------------------
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------------
      # 5. Make sure the CSV directory exists
      # ---------------------------------------------------------
      - name: Create CSV directory
        shell: bash
        run: |
          mkdir -p csv

      # ---------------------------------------------------------
      # 6. Create CBS holiday dataset
      # ---------------------------------------------------------
      - name: Create CBS holiday dataset
        shell: bash
        run: |
          set -euo pipefail

          python -u "scripts/1.create_cbs_dataset.py"

          echo ""
          echo "Files created after CBS script:"
          find . -maxdepth 3 -type f | sort

          if [ ! -f "csv/CBS_holidays.csv" ]; then
            echo "::error::csv/CBS_holidays.csv was not created."

            echo "Possible CBS CSV files:"
            find . -type f -iname "*cbs*holiday*.csv" -print || true

            exit 1
          fi

          echo "CBS dataset created successfully."

      # ---------------------------------------------------------
      # 7. Create government document holiday dataset
      # ---------------------------------------------------------
      - name: Create government document holiday dataset
        shell: bash
        run: |
          set -euo pipefail

          python -u "scripts/2.create_document_dataset.py"

          if [ ! -f "csv/Document_gov_holidays.csv" ]; then
            echo "::error::csv/Document_gov_holidays.csv was not created."

            echo "Possible document CSV files:"
            find . -type f -iname "*document*holiday*.csv" -print || true

            exit 1
          fi

          echo "Government document dataset created successfully."

      # ---------------------------------------------------------
      # 8. Combine both holiday datasets
      # ---------------------------------------------------------
      - name: Combine holiday datasets
        shell: bash
        run: |
          set -euo pipefail

          python -u "scripts/3.combine_holidays.py"

          if [ ! -f "csv/Combined_holidays.csv" ]; then
            echo "::error::csv/Combined_holidays.csv was not created."
            exit 1
          fi

          echo "Combined holiday dataset created successfully."

      # ---------------------------------------------------------
      # 9. Create complete calendar dataset
      # ---------------------------------------------------------
      - name: Create final calendar dataset
        shell: bash
        run: |
          set -euo pipefail

          python -u "scripts/4.create_final_dataset.py"

          if [ ! -f "csv/Sri_Lanka_all_dates.csv" ]; then
            echo "::error::csv/Sri_Lanka_all_dates.csv was not created."
            exit 1
          fi

          echo "Final calendar dataset created successfully."

      # ---------------------------------------------------------
      # 10. Show generated files
      # ---------------------------------------------------------
      - name: Display generated CSV files
        shell: bash
        run: |
          echo "Generated CSV files:"
          echo "---------------------------------------------------"

          find csv -maxdepth 1 -type f -name "*.csv" \
            -exec ls -lh {} \;

          echo "---------------------------------------------------"

          echo "CSV files ignored by .gitignore:"
          git check-ignore -v csv/*.csv || true

          echo "Git status:"
          git status --short

      # ---------------------------------------------------------
      # 11. Validate the final dataset
      # ---------------------------------------------------------
      - name: Validate final dataset
        shell: bash
        run: |
          python - <<'PY'
          from datetime import date
          from pathlib import Path

          import pandas as pd


          DATASET_PATH = Path("csv/Sri_Lanka_all_dates.csv")

          REQUIRED_COLUMNS = {
              "Full_Date",
              "Year",
              "Month",
              "Date",
              "Day",
              "Holiday_Name",
              "Is_Holiday",
              "Is_Public_Holiday",
              "Is_Bank_Holiday",
              "Is_Mercantile_Holiday",
              "Is_Poya_Day",
              "Is_Weekend",
          }


          def to_boolean(value):
              if pd.isna(value):
                  return False

              if isinstance(value, bool):
                  return value

              return str(value).strip().casefold() in {
                  "true",
                  "1",
                  "yes",
                  "y",
                  "t",
              }


          if not DATASET_PATH.is_file():
              raise FileNotFoundError(
                  f"Final dataset was not found: {DATASET_PATH}"
              )

          df = pd.read_csv(DATASET_PATH)

          if df.empty:
              raise ValueError("The final dataset is empty.")

          missing_columns = REQUIRED_COLUMNS - set(df.columns)

          if missing_columns:
              raise ValueError(
                  "Missing required columns: "
                  + ", ".join(sorted(missing_columns))
              )

          full_dates = pd.to_datetime(
              df["Full_Date"],
              errors="coerce",
          )

          if full_dates.isna().any():
              invalid_rows = df.loc[
                  full_dates.isna(),
                  ["Full_Date"],
              ]

              raise ValueError(
                  "Invalid Full_Date values found:\n"
                  + invalid_rows.to_string(index=False)
              )

          if full_dates.duplicated().any():
              duplicate_rows = df.loc[
                  full_dates.duplicated(keep=False),
                  ["Full_Date", "Holiday_Name"],
              ]

              raise ValueError(
                  "Duplicate dates found:\n"
                  + duplicate_rows.to_string(index=False)
              )

          expected_start_date = pd.Timestamp("2005-01-01")

          if full_dates.min() != expected_start_date:
              raise ValueError(
                  "The dataset must start from 2005-01-01. "
                  f"Current start date: {full_dates.min().date()}"
              )

          if not full_dates.is_monotonic_increasing:
              raise ValueError(
                  "The dataset is not sorted by Full_Date."
              )

          date_differences = full_dates.diff().dropna()

          missing_date_positions = (
              date_differences != pd.Timedelta(days=1)
          )

          if missing_date_positions.any():
              raise ValueError(
                  "One or more calendar dates are missing."
              )

          current_year = date.today().year

          if full_dates.max().year < current_year:
              raise ValueError(
                  f"The dataset does not include {current_year}."
              )

          weekend_values = df["Is_Weekend"].apply(
              to_boolean
          )

          bank_holiday_values = df[
              "Is_Bank_Holiday"
          ].apply(to_boolean)

          invalid_weekends = df[
              weekend_values & ~bank_holiday_values
          ]

          if not invalid_weekends.empty:
              raise ValueError(
                  "Some weekend dates are not marked as "
                  "bank holidays:\n"
                  + invalid_weekends[
                      [
                          "Full_Date",
                          "Day",
                          "Is_Weekend",
                          "Is_Bank_Holiday",
                      ]
                  ].head(20).to_string(index=False)
              )

          print("=" * 60)
          print("Dataset validation passed.")
          print(f"Total rows: {len(df)}")
          print(f"Start date: {full_dates.min().date()}")
          print(f"End date: {full_dates.max().date()}")
          print(f"Current year: {current_year}")
          print("=" * 60)
          PY

      # ---------------------------------------------------------
      # 12. Force-add CSV files and create a local commit
      #
      # git add -f ensures CSV files are added even when *.csv
      # or csv/ appears in .gitignore.
      # ---------------------------------------------------------
      - name: Commit generated CSV files
        id: commit_csv
        shell: bash
        run: |
          set -euo pipefail

          git config \
            user.name \
            "github-actions[bot]"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            csv/CBS_holidays.csv \
            csv/Document_gov_holidays.csv \
            csv/Combined_holidays.csv \
            csv/Sri_Lanka_all_dates.csv

          echo "Staged CSV changes:"
          git status --short

          if git diff --cached --quiet; then
            echo "No CSV changes were detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "CSV changes were detected."
            git diff --cached --stat

            git commit \
              -m "data: update Sri Lanka holiday datasets"

            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------
      # 13. Create or update a pull request
      # ---------------------------------------------------------
      - name: Create dataset update pull request
        id: create_pr
        if: steps.commit_csv.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          base: main
          branch: automation/annual-holiday-update
          delete-branch: true

          title: "data: update Sri Lanka holiday datasets"

          body: |
            ## Automated holiday dataset update

            This pull request was generated automatically by GitHub Actions.

            ### Updated files

            - `csv/CBS_holidays.csv`
            - `csv/Document_gov_holidays.csv`
            - `csv/Combined_holidays.csv`
            - `csv/Sri_Lanka_all_dates.csv`

            ### Validation performed

            - The dataset starts from `2005-01-01`
            - Dates are sorted chronologically
            - No duplicate dates exist in the final dataset
            - No calendar dates are missing
            - The dataset includes the current year
            - Saturdays and Sundays are marked as bank holidays

            Please review the CSV changes before merging this pull request.

      # ---------------------------------------------------------
      # 14. Display pull request result
      # ---------------------------------------------------------
      - name: Show pull request result
        if: steps.create_pr.outputs.pull-request-url
        shell: bash
        env:
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.create_pr.outputs.pull-request-operation }}
        run: |
          echo "::notice::Pull request ${PR_OPERATION}: ${PR_URL}"

      # ---------------------------------------------------------
      # 15. No-change message
      # ---------------------------------------------------------
      - name: Show no changes message
        if: steps.commit_csv.outputs.changed == 'false'
        shell: bash
        run: |
          echo "::notice::The scripts completed successfully, but no CSV changes were detected."