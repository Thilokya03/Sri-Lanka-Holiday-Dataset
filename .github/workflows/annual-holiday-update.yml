name: Annual Sri Lanka Holiday Dataset Update

on:
  # Allows you to run the workflow manually
  workflow_dispatch:

  # Runs every January 5 at 03:30 UTC
  # This is 09:00 AM in Sri Lanka
  schedule:
    - cron: "30 3 5 1 *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: annual-holiday-dataset-update
  cancel-in-progress: false

jobs:
  update-dataset:
    name: Update holiday datasets
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run holiday data pipeline
        run: |
          set -euo pipefail

          python "scripts/1.create_cbs_dataset.py"
          python "scripts/2.create_document_dataset.py"
          python "scripts/3.combine_holidays.py"
          python "scripts/4.create_final_dataset.py"

      - name: Validate final dataset
        run: |
          python - <<'PY'
          from datetime import date
          from pathlib import Path

          import pandas as pd


          dataset_path = Path("csv/Sri_Lanka_all_dates.csv")

          if not dataset_path.exists():
              raise FileNotFoundError(
                  f"Final dataset was not created: {dataset_path}"
              )

          df = pd.read_csv(dataset_path)

          required_columns = {
              "Full_Date",
              "Year",
              "Month",
              "Date",
              "Day",
              "Holiday_Name",
              "Is_Holiday",
              "Is_Public_Holiday",
              "Is_Bank_Holiday",
              "Is_Mercantile_Holiday",
              "Is_Poya_Day",
              "Is_Weekend",
          }

          missing_columns = required_columns - set(df.columns)

          if missing_columns:
              raise ValueError(
                  "Missing required columns: "
                  + ", ".join(sorted(missing_columns))
              )

          if df.empty:
              raise ValueError("The final dataset is empty.")

          dates = pd.to_datetime(
              df["Full_Date"],
              errors="coerce",
          )

          if dates.isna().any():
              invalid_rows = df.loc[
                  dates.isna(),
                  ["Full_Date"],
              ]

              raise ValueError(
                  "Invalid dates found:\n"
                  + invalid_rows.to_string(index=False)
              )

          if dates.duplicated().any():
              duplicate_dates = df.loc[
                  dates.duplicated(keep=False),
                  ["Full_Date", "Holiday_Name"],
              ]

              raise ValueError(
                  "Duplicate dates found:\n"
                  + duplicate_dates.to_string(index=False)
              )

          if dates.min() != pd.Timestamp("2005-01-01"):
              raise ValueError(
                  "The dataset must start from 2005-01-01."
              )

          if not dates.is_monotonic_increasing:
              raise ValueError(
                  "The dataset is not sorted by Full_Date."
              )

          date_differences = dates.diff().dropna()

          if not date_differences.eq(
              pd.Timedelta(days=1)
          ).all():
              raise ValueError(
                  "One or more calendar dates are missing."
              )

          if dates.max().year < date.today().year:
              raise ValueError(
                  "The dataset does not include the current year."
              )

          weekend_rows = df[
              df["Is_Weekend"].astype(str).str.lower() == "true"
          ]

          invalid_weekend_bank_rows = weekend_rows[
              weekend_rows[
                  "Is_Bank_Holiday"
              ].astype(str).str.lower() != "true"
          ]

          if not invalid_weekend_bank_rows.empty:
              raise ValueError(
                  "Some weekends are not marked as bank holidays."
              )

          print("Dataset validation passed.")
          print(f"Rows: {len(df)}")
          print(f"Start date: {dates.min().date()}")
          print(f"End date: {dates.max().date()}")
          PY

      - name: Check whether CSV files changed
        id: csv_changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- csv/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No CSV changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CSV changes detected:"
            git status --short -- csv/
          fi

      - name: Create update branch and pull request
        if: steps.csv_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: data/annual-update-${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "$BRANCH_NAME"

          git add csv/

          git commit \
            -m "data: update annual Sri Lanka holiday datasets"

          git push \
            --set-upstream origin "$BRANCH_NAME"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "data: annual Sri Lanka holiday dataset update" \
            --body "This pull request was created automatically.

          It runs the complete holiday-data pipeline, validates the final dataset, and updates the generated CSV files.

          Please review the holiday-name differences and unmatched dates before merging."